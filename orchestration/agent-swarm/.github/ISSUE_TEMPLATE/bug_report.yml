name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start the API server with `bun run start:http`
        2. Send a task via ...
        3. See error in ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Agent Swarm is affected?
      options:
        - API Server
        - Worker / Runner
        - Lead Agent
        - Dashboard UI
        - CLI (`bunx @desplega.ai/agent-swarm`)
        - Slack Integration
        - GitHub Integration
        - AgentMail Integration
        - Memory System
        - Docker / Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: Ubuntu 22.04
        - Bun version: 1.x
        - Deployment: Docker Compose / Local
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant log output or screenshots.
      render: shell
    validations:
      required: false
